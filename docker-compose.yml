services:
  shopware:
    build: ./
    container_name: flutterwave-v3-shopware
    environment:
      - 'XDEBUG_ENABLED=0'
      - 'PHP_VERSION=8.3'
    volumes:
      # ----------------------------------------------------------------------------------------------------------------------------------
      # PLUGINS
      - "./:/var/www/html/custom/plugins/KommandhubFlutterwaveV3SW"
      - "database:/var/lib/mysql"
      - "./Makefile:/var/www/html/Makefile"
      # - ".env.test:/var/www/html/.env.test"
      # ----------------------------------------------------------------------------------------------------------------------------------
      # EXCLUDE
      - "/var/www/html/custom/plugins/KommandhubFlutterwaveV3SW/.git/"
      - "/var/www/html/custom/plugins/KommandhubFlutterwaveV3SW/node_modules/"
      - "/var/www/html/custom/plugins/KommandhubFlutterwaveV3SW/vendor/"
      # ----------------------------------------------------------------------------------------------------------------------------------

volumes:
  database:
    driver: local